<div class="appointment-list-container">
  <app-page-header
    title="Appointments"
    icon="event_note"
    subtitle="Manage all hospital appointments"
  ></app-page-header>

  <div class="action-bar">
    <button mat-raised-button color="primary" (click)="createAppointment()">
      <mat-icon>add_circle</mat-icon>
      Create New Appointment
    </button>
  </div>

  <app-loading-spinner
    *ngIf="loading"
    message="Loading appointments..."
  ></app-loading-spinner>

  <div *ngIf="!loading && error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && appointments.length === 0 && !error">
    <app-empty-state
      icon="event_note"
      title="No Appointments Found"
      description="No appointments scheduled yet."
    ></app-empty-state>
  </div>

  <div
    *ngIf="!loading && appointments.length > 0 && !error"
    class="table-container"
  >
    <mat-card>
      <table mat-table [dataSource]="appointments" class="appointment-table">
        <!-- Appointment ID Column -->
        <ng-container matColumnDef="appointmentId">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">
            #{{ element.appointmentId }}
          </td>
        </ng-container>

        <!-- Doctor Name Column -->
        <ng-container matColumnDef="doctorName">
          <th mat-header-cell *matHeaderCellDef>Doctor</th>
          <td mat-cell *matCellDef="let element">
            <div class="doctor-cell">
              <mat-icon class="table-icon">local_hospital</mat-icon>
              <span>{{ element.doctorName }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Patient Name Column -->
        <ng-container matColumnDef="patientName">
          <th mat-header-cell *matHeaderCellDef>Patient</th>
          <td mat-cell *matCellDef="let element">
            <div class="patient-cell">
              <mat-icon class="table-icon">person</mat-icon>
              <span>{{ element.patientName }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let element">
            {{ formatDate(element.appointmentDate) }}
          </td>
        </ng-container>

        <!-- Time Column -->
        <ng-container matColumnDef="time">
          <th mat-header-cell *matHeaderCellDef>Time</th>
          <td mat-cell *matCellDef="let element">
            {{ element.appointmentTime }}
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip
              [color]="getStatusColor(element.appointmentStatus)"
              selected
            >
              {{ element.appointmentStatus }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Reason Column -->
        <ng-container matColumnDef="reason">
          <th mat-header-cell *matHeaderCellDef>Reason</th>
          <td mat-cell *matCellDef="let element">
            <span class="reason-text">{{ element.reason }}</span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <div class="action-buttons">
              <button
                mat-stroked-button
                (click)="updateStatus(element)"
                class="btn-edit"
                matTooltip="Update Status"
              >
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button
                mat-stroked-button
                (click)="deleteAppointment(element)"
                class="btn-delete"
                matTooltip="Delete"
              >
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  </div>
</div>
