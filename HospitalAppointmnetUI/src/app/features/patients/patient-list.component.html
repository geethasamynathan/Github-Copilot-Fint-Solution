<div class="patient-list-container">
  <app-page-header
    title="Patients"
    icon="people"
    subtitle="Manage and view all registered patients"
  ></app-page-header>

  <app-loading-spinner
    *ngIf="loading"
    message="Loading patients..."
  ></app-loading-spinner>

  <div *ngIf="!loading && error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && patients.length === 0 && !error">
    <app-empty-state
      icon="people"
      title="No Patients Found"
      description="No patients are registered in the system yet."
    ></app-empty-state>
  </div>

  <div
    *ngIf="!loading && patients.length > 0 && !error"
    class="table-container"
  >
    <mat-card>
      <table mat-table [dataSource]="patients" class="patient-table">
        <!-- Full Name Column -->
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef>Patient Name</th>
          <td mat-cell *matCellDef="let element">
            <div class="name-cell">
              <mat-icon class="patient-icon">person</mat-icon>
              <span>{{ element.fullName }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let element">
            <a [href]="'mailto:' + element.email">{{ element.email }}</a>
          </td>
        </ng-container>

        <!-- Phone Column -->
        <ng-container matColumnDef="phoneNumber">
          <th mat-header-cell *matHeaderCellDef>Phone</th>
          <td mat-cell *matCellDef="let element">
            {{ element.phoneNumber }}
          </td>
        </ng-container>

        <!-- Gender Column -->
        <ng-container matColumnDef="gender">
          <th mat-header-cell *matHeaderCellDef>Gender</th>
          <td mat-cell *matCellDef="let element">
            {{ element.gender }}
          </td>
        </ng-container>

        <!-- Date of Birth Column -->
        <ng-container matColumnDef="dateOfBirth">
          <th mat-header-cell *matHeaderCellDef>Date of Birth</th>
          <td mat-cell *matCellDef="let element">
            {{ formatDate(element.dateOfBirth) }}
          </td>
        </ng-container>

        <!-- Address Column -->
        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let element">
            <span class="address-text">{{ element.address }}</span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button
              mat-icon-button
              (click)="viewDetails(element)"
              matTooltip="View Details"
            >
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  </div>
</div>
